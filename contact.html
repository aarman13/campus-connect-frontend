<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Smart College Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="fas fa-graduation-cap"></i> College Events </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row g-5">
            <div class="col-lg-5">
                <h2 class="fw-bold mb-4">Get in Touch</h2>
                <p class="text-muted mb-5">Have questions about an upcoming event or need help with registration? Our team is here to help you.</p>
                
                <div class="d-flex mb-4">
                    <div class="icon-box me-3">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div>
                        <h6 class="fw-bold mb-0">Email Us</h6>
                        <p class="text-muted">events@smartcollege.edu</p>
                    </div>
                </div>

                <div class="d-flex mb-4">
                    <div class="icon-box me-3">
                        <i class="fas fa-phone-alt"></i>
                    </div>
                    <div>
                        <h6 class="fw-bold mb-0">Call Us</h6>
                        <p class="text-muted">+91 6677889900</p>
                    </div>
                </div>

                <div class="d-flex mb-4">
                    <div class="icon-box me-3">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <div>
                        <h6 class="fw-bold mb-0">Location</h6>
                        <p class="text-muted">Art Block,101 room</p>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="card border-0 shadow-sm p-4 rounded-4">
                    <form id="contactForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Full Name</label>
                                <input type="text" class="form-control bg-light border-0" placeholder="John Doe" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Email Address</label>
                                <input type="email" class="form-control bg-light border-0" placeholder="john@example.com" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Subject</label>
                                <input type="text" class="form-control bg-light border-0" placeholder="Event Inquiry" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Message</label>
                                <textarea class="form-control bg-light border-0" rows="5" placeholder="How can we help you?" required></textarea>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Send Message</button>
                            </div>
                        </div>
                    </form>
                    <div id="formSuccess" class="alert alert-success mt-3 d-none">
                        Message sent successfully! We'll get back to you soon.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Show success message
            document.getElementById('formSuccess').classList.remove('d-none');
            this.reset(); // Clear form
        });
    </script>
</body>
</html>
