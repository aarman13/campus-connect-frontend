<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Smart College Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

    <div class="auth-card">
        <div class="icon-circle">
            <span>🎓</span>
        </div>
        <h2 class="fw-bold">Create Account</h2>
        <p class="text-muted mb-4">Join the college event community</p>

        <form id="signupForm">
            <div class="row g-3 mb-3">
                <div class="col-md-6 text-start">
                    <label class="form-label small fw-bold">First Name</label>
                    <input type="text" class="form-control" placeholder="Fairy" required>
                </div>
                <div class="col-md-6 text-start">
                    <label class="form-label small fw-bold">Last Name</label>
                    <input type="text" class="form-control" placeholder="Danny" required>
                </div>
            </div>

            <div class="mb-3 text-start">
                <label class="form-label small fw-bold">Student ID / Roll No</label>
                <input type="text" class="form-control" placeholder="e.g. 45257" required>
            </div>

            <div class="mb-3 text-start">
                <label class="form-label small fw-bold">College Email</label>
                <input type="email" class="form-control" placeholder="fairy@college.edu" required>
            </div>

            <div class="mb-4 text-start">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" class="form-control" placeholder="Create a password" required>
            </div>
            
            <button type="submit" class="btn btn-signin">Create Account</button>
        </form>

        <div class="links mt-4">
            Already have an account? <a href="login.html" class="fw-bold">Sign In</a>
        </div>
        
        <a href="index.html" class="back-home mt-3">← Back to Home</a>
    </div>

</body>
</html>
